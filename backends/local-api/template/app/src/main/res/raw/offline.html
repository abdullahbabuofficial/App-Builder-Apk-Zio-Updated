<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>__APP_NAME__ — Offline</title>
    <style>
      :root {
        color-scheme: dark light;
        --bg: __BACKGROUND_HEX__;
        --fg: #ffffff;
        --accent: __PRIMARY_HEX__;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 32px;
        text-align: center;
        min-height: 100%;
        box-sizing: border-box;
      }
      .dot {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: var(--accent);
        opacity: 0.85;
      }
      h1 { font-size: 20px; margin: 0; }
      p  { opacity: 0.75; max-width: 32ch; line-height: 1.5; margin: 0; }
      button {
        margin-top: 8px;
        background: var(--accent);
        color: #000;
        border: 0;
        padding: 12px 18px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="dot" aria-hidden="true"></div>
      <h1>__APP_NAME__</h1>
      <p>__OFFLINE_MESSAGE__</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
