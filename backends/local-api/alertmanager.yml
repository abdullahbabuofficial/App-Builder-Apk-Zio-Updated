global:
  resolve_timeout: 5m
  slack_api_url: 'YOUR_SLACK_WEBHOOK_URL'  # Optional: Add your Slack webhook

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    
    - match:
        severity: warning
      receiver: 'warning-alerts'
      continue: true

receivers:
  - name: 'default'
    # Default receiver - logs to stdout
    
  - name: 'critical-alerts'
    # Critical alerts - page on-call
    # slack_configs:
    #   - channel: '#alerts-critical'
    #     title: '🚨 Critical Alert'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'
    
  - name: 'warning-alerts'
    # Warning alerts - notify team
    # slack_configs:
    #   - channel: '#alerts'
    #     title: '⚠️ Warning Alert'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
