global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'apkzio-local'
    environment: 'production'

# Load alerting rules
rule_files:
  - /etc/prometheus/alerting-rules.yml

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # ApkZio API
  - job_name: 'apkzio-api'
    static_configs:
      - targets: ['host.docker.internal:8787']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (if you add it for host metrics)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
