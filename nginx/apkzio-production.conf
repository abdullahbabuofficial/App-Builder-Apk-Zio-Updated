# ApkZio Production Nginx Configuration
# This file should be copied to /etc/nginx/sites-available/apkzio

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=builder_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=200r/m;

# Upstream backend API
upstream apkzio_api {
    server 127.0.0.1:3001 fail_timeout=30s max_fails=3;
    keepalive 32;
}

# ============================================
# API Server (api.apkzio.com)
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name api.apkzio.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.apkzio.com;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.apkzio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.apkzio.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.apkzio.com/chain.pem;

    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS Headers (adjust as needed)
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Apkzio-Admin-Key, X-PC-App-Key" always;

    # Client body size (for APK uploads)
    client_max_body_size 200M;
    client_body_buffer_size 128k;

    # Timeouts
    client_body_timeout 300s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 300s;

    # Logging
    access_log /var/log/nginx/api.apkzio.com.access.log combined;
    error_log /var/log/nginx/api.apkzio.com.error.log warn;

    # Rate limiting for builder API
    location /api/builder {
        limit_req zone=builder_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://apkzio_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Long timeouts for APK builds (30 minutes)
        proxy_connect_timeout 1800s;
        proxy_send_timeout 1800s;
        proxy_read_timeout 1800s;
        proxy_buffering off;
    }

    # Rate limiting for general API
    location /api {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://apkzio_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # SDK endpoints (higher rate limits)
    location /sdk {
        limit_req zone=general_limit burst=50 nodelay;

        proxy_pass http://apkzio_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check (no rate limiting)
    location /health {
        proxy_pass http://apkzio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Metrics endpoint (no rate limiting)
    location /metrics {
        proxy_pass http://apkzio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # All other routes
    location / {
        limit_req zone=general_limit burst=50 nodelay;

        proxy_pass http://apkzio_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ============================================
# Admin Dashboard (admin.apkzio.com)
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name admin.apkzio.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.apkzio.com;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/admin.apkzio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.apkzio.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/admin.apkzio.com/chain.pem;

    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.apkzio.com https://*.supabase.co; frame-src 'none';" always;

    # Document root
    root /root/home/apkzio/apkzio-admin/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Logging
    access_log /var/log/nginx/admin.apkzio.com.access.log combined;
    error_log /var/log/nginx/admin.apkzio.com.error.log warn;

    # Static assets with long cache
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security: deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ============================================
# Public Frontend (apkzio.com, www.apkzio.com)
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name apkzio.com www.apkzio.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name apkzio.com www.apkzio.com;

    # Redirect www to non-www
    if ($host = 'www.apkzio.com') {
        return 301 https://apkzio.com$request_uri;
    }

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/apkzio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apkzio.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/apkzio.com/chain.pem;

    # SSL Security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Document root (Next.js static export)
    root /root/home/apkzio/apkzio-pub/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Logging
    access_log /var/log/nginx/apkzio.com.access.log combined;
    error_log /var/log/nginx/apkzio.com.error.log warn;

    # Next.js static files with long cache
    location ~* ^/_next/static/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public static assets
    location ~* ^/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # Next.js image optimization (if using next/image)
    location /_next/image {
        proxy_pass http://apkzio_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js pages
    location / {
        try_files $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Security: deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
