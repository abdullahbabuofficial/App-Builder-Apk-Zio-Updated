# ApkZio Production Nginx Configuration (with existing SSL)
# This config uses existing SSL certificates from certbot

# API Server
server {
    listen 80;
    server_name api.apkzio.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.apkzio.com;

    # SSL Configuration (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/api.apkzio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.apkzio.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Client body size
    client_max_body_size 200M;

    # Logging
    access_log /var/log/nginx/api.apkzio.com.access.log;
    error_log /var/log/nginx/api.apkzio.com.error.log;

    # Proxy to backend API
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts for APK builds
        proxy_connect_timeout 1800;
        proxy_send_timeout 1800;
        proxy_read_timeout 1800;
        proxy_buffering off;
    }
}

# Admin Dashboard
server {
    listen 80;
    server_name admin.apkzio.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name admin.apkzio.com;

    # SSL Configuration (using api cert for now)
    ssl_certificate /etc/letsencrypt/live/api.apkzio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.apkzio.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Document root
    root /root/home/apkzio/apkzio-admin/dist;
    index index.html;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # Logging
    access_log /var/log/nginx/admin.apkzio.com.access.log;
    error_log /var/log/nginx/admin.apkzio.com.error.log;

    # Static assets with long cache
    location ~* ^/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# Public Frontend
server {
    listen 80;
    server_name apkzio.com www.apkzio.com;
    return 301 https://apkzio.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name apkzio.com www.apkzio.com;

    # Redirect www to non-www
    if ($host = 'www.apkzio.com') {
        return 301 https://apkzio.com$request_uri;
    }

    # SSL Configuration (using api cert for now)
    ssl_certificate /etc/letsencrypt/live/api.apkzio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.apkzio.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Document root
    root /root/home/apkzio/apkzio-pub/dist;
    index index.html;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;

    # Logging
    access_log /var/log/nginx/apkzio.com.access.log;
    error_log /var/log/nginx/apkzio.com.error.log;

    # Static files
    location ~* ^/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # SPA/Next.js fallback
    location / {
        try_files $uri $uri/ $uri.html /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
